<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reverse String</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    font-family: 'Segoe UI', sans-serif;
    color: #e2e8f0;
  }
  .card {
    background: #1e293b;
    border-radius: 16px;
    padding: 40px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 1.6rem;
    text-align: center;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #38bdf8, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p.sub {
    text-align: center;
    color: #94a3b8;
    font-size: 0.9rem;
    margin-bottom: 28px;
  }
  label { font-size: 0.85rem; color: #94a3b8; display: block; margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #334155;
    border-radius: 10px;
    background: #0f172a;
    color: #f1f5f9;
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }
  input:focus { border-color: #38bdf8; }
  .result-box {
    margin-top: 24px;
    background: #0f172a;
    border: 2px solid #334155;
    border-radius: 10px;
    padding: 14px 16px;
    min-height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s;
  }
  .result-box.active { border-color: #a78bfa; }
  .result-text {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #a78bfa, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    word-break: break-all;
    text-align: center;
  }
  .placeholder { color: #475569; font-size: 0.95rem; }
  .arrow {
    text-align: center;
    margin-top: 18px;
    font-size: 1.4rem;
    color: #475569;
    animation: bounce 1.5s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(5px); }
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Reverse String</h1>
    <p class="sub">Type anything and see it reversed instantly</p>
    <label>Your text</label>
    <input type="text" id="inp" placeholder="e.g. ABCDEF" autofocus>
    <div class="arrow">↓</div>
    <label style="margin-top:12px">Reversed</label>
    <div class="result-box" id="box">
      <span class="placeholder" id="out">Start typing…</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
